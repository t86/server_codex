services:
  api:
    build:
      context: .
    command: sh -c "npm run db:migrate && npm run start -w @server-codex/api"
    environment:
      DATABASE_URL: postgres://server_codex:server_codex@postgres:5432/server_codex
      REDIS_URL: redis://redis:6379
      CODEX_DATA_DIR: /srv/codex
      API_PORT: 4000
    volumes:
      - /srv/codex:/srv/codex
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  runner:
    build:
      context: .
    command: npm run start -w @server-codex/runner
    environment:
      DATABASE_URL: postgres://server_codex:server_codex@postgres:5432/server_codex
      REDIS_URL: redis://redis:6379
      CODEX_DATA_DIR: /srv/codex
      CODEX_BIN: /app/node_modules/.bin/codex
    volumes:
      - /srv/codex:/srv/codex
    depends_on:
      api:
        condition: service_started

  web:
    build:
      context: .
    command: npm run start -w @server-codex/web
    environment:
      API_INTERNAL_URL: http://api:4000
      WEB_BASIC_AUTH_USER: ${WEB_BASIC_AUTH_USER:-admin}
      WEB_BASIC_AUTH_PASSWORD: ${WEB_BASIC_AUTH_PASSWORD:?WEB_BASIC_AUTH_PASSWORD is required}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: server_codex
      POSTGRES_USER: server_codex
      POSTGRES_PASSWORD: server_codex
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U server_codex -d server_codex"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
